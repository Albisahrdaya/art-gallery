<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Left Side -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-dark text-white">

                <div class="text-center px-5">
                    <h1 class="display-3 fw-bold mb-4">
                        🎨 Art Gallery
                    </h1>

                    <p class="lead">
                        Discover timeless masterpieces from legendary artists around the world.
                    </p>

                    <img src="images/Hero.jpeg"
                         class="img-fluid rounded shadow mt-4"
                         alt="Art Gallery">
                </div>

            </div>

            <!-- Right Side -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center">

                <div class="card shadow-lg border-0 p-4" style="max-width:420px; width:100%;">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">
                            Login to continue exploring the gallery.
                        </p>
                    </div>

                    <form>

                        <div class="mb-3">
                            <label class="form-label">
                                Email Address
                            </label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope-fill"></i>
                                </span>

                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="Enter your email">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Password
                            </label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>

                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="Enter your password">
                            </div>
                        </div>

                        <!-- Since no backend exists, this just navigates to home.html -->
                        <a href="home.html" class="btn btn-dark w-100 mb-3">
                            Login
                        </a>

                    </form>

                    <div class="text-center">
                        <p class="mb-0">
                            Don't have an account?
                            <a href="signup.html" class="text-decoration-none fw-semibold">
                                Sign Up
                            </a>
                        </p>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
